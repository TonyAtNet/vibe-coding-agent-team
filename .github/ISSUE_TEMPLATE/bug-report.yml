name: Bug Report
description: 报告角色内容中的错误或过时信息
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的反馈！请详细描述问题，帮助我们快速定位和修复。

  - type: input
    id: role
    attributes:
      label: 涉及角色
      description: 哪个 .md 文件有问题？
      placeholder: 例如：vibe-prototyper.md
    validations:
      required: true

  - type: dropdown
    id: bug_type
    attributes:
      label: 错误类型
      description: 这是什么类型的问题？
      options:
        - 工具链过时或失效
        - 内容事实错误
        - 链接失效
        - 格式/排版问题
        - 指标不可量化
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清楚描述问题是什么。如果是工具链过时，请说明该工具的现状。
      placeholder: |
        例如：vibe-prototyper.md 中提到的 Bolt 工具已停止服务，
        建议替换为 Tempo 或 Lovable。
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望的修复
      description: 你希望如何修复？如果有具体建议，请写出来。
      placeholder: |
        例如：将 Bolt 替换为 Tempo，并更新相关描述为：
        "Tempo：AI 驱动的 React 原型生成工具"

  - type: input
    id: version
    attributes:
      label: 发现时间
      description: 你是什么时候发现这个问题的？
      placeholder: 例如：2026-06-21

  - type: checkboxes
    id: checklist
    attributes:
      label: 自检清单
      description: 提交前请确认以下事项
      options:
        - label: 我已确认这个问题在最新版本中仍然存在
          required: true
        - label: 我已搜索过现有 Issues，没有重复报告
          required: true
